<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alumni Profiles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Font Awesome CDN for social icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #e0f2f1;
      color: #004d40;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background: url("https://images.unsplash.com/photo-1580587771525-78b9dba3b914?auto=format&fit=crop&w=1200&q=80") center/cover no-repeat;
      color: white;
      text-align: center;
      padding: 4rem 1rem;
      position: relative;
    }
    header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 77, 64, 0.6);
    }
    header h1 {
      position: relative;
      z-index: 1;
      font-size: 3rem;
      text-transform: uppercase;
      font-weight: 900;
    }
    nav {
      background: #004d40;
      display: flex;
      justify-content: center;
      padding: 1rem 0;
      gap: 2.5rem;
    }
    nav a {
      color: #b2dfdb;
      font-size: 1rem;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      color:#ff7043;
      text-decoration: underline;
    }
    main {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* Form */
    form {
      background: white;
      padding: 1.5rem;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
    }
    form h2 {
      text-align: center;
      margin-bottom: 1rem;
      color: #004d40;
    }
    form .form-group {
      margin-bottom: 1rem;
    }
    form label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.4rem;
    }
    form input {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    form button {
      background-color: #ff7043;
      color: white;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      display: block;
      margin: 1rem auto 0;
    }
    form button:hover {
      background-color: #e64a19;
    }

    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .profile-card {
      background: white;
      border-radius: 10px;
      padding: 1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .profile-card:hover {
      transform: translateY(-5px);
    }
    .profile-card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #ff7043;
      margin-bottom: 0.5rem;
    }
    .profile-card h3 {
      margin: 0.3rem 0;
      font-size: 1.2rem;
    }
    .profile-card p {
      color: #00695c;
      font-size: 0.9rem;
    }

    footer {
      background: #004d40;
      color: #b2dfdb;
      text-align: center;
      padding: 1rem 0;
      margin-top: auto;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      max-width: 500px;
      width: 90%;
      position: relative;
    }
    .modal-content h2 {
      margin-top: 0;
    }
    .close-btn {
      position: absolute;
      top: 10px; right: 15px;
      font-size: 1.5rem;
      cursor: pointer;
      color: #ff7043;
    }
    .modal-content a {
      display: block;
      margin-bottom: 0.5rem;
      color: #00796b;
    }

    .social-links {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 25px;
    }
    .social-links a {
      color: #ff7043;
      font-size: 1.5rem;
      transition: color 0.3s;
    }
    .social-links a:hover {
      color: #ffffff;
    }
  </style>
</head>
<body>

<header>
  <h1>Alumni Profiles</h1>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
  <a href="emergency.html">Emergency</a>
</nav>

<main>
  <form id="profileForm" style="width:650px">
    <h2>Add Alumni Profile</h2>
    <div class="form-group"><label>Name:</label><input type="text" id="name" required></div>
    <div class="form-group"><label>Batch:</label><input type="text" id="batch" required></div>
    <div class="form-group"><label>Company:</label><input type="text" id="company"></div>
    <div class="form-group"><label>Job Role:</label><input type="text" id="role"></div>
    <div class="form-group"><label>Salary:</label><input type="text" id="salary"></div>
    <div class="form-group"><label>Email:</label><input type="email" id="email"></div>
    <div class="form-group"><label>Phone:</label><input type="tel" id="phone"></div>
    <div class="form-group"><label>LinkedIn URL:</label><input type="url" id="linkedin"></div>
    <div class="form-group"><label>Instagram ID:</label><input type="text" id="insta"></div>
    <div class="form-group"><label>Facebook (Optional):</label><input type="text" id="facebook"></div>
    <div class="form-group"><label>Image URL:</label><input type="url" id="image"></div>
    <button type="submit">Add Profile</button>
  </form>

  <div class="profiles-grid" id="profilesContainer"></div>
</main>

<!-- Modal for profile details -->
<div class="modal" id="profileModal">
  <div class="modal-content" id="modalContent">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <!-- Content added dynamically -->
  </div>
</div>

<footer>
  &copy; 2025 Alumni Management System — All rights reserved.
  <div class="social-links">
      <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
      <a href="https://www.youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
</footer>

<script>
  const form = document.getElementById("profileForm");
  const profilesContainer = document.getElementById("profilesContainer");
  const modal = document.getElementById("profileModal");
  const modalContent = document.getElementById("modalContent");

  const getProfiles = () => JSON.parse(localStorage.getItem("profiles") || "[]");

  const saveProfile = (profile) => {
    const profiles = getProfiles();
    profiles.push(profile);
    localStorage.setItem("profiles", JSON.stringify(profiles));
    renderProfiles();
  };

  const renderProfiles = () => {
    const profiles = getProfiles();
    profilesContainer.innerHTML = "";
    profiles.forEach((p, index) => {
      const card = document.createElement("div");
      card.className = "profile-card";
      card.innerHTML = `
        <img src="${p.image || 'https://via.placeholder.com/100'}" />
        <h3>${p.name}</h3>
        <p>${p.role}</p>
        <p>${p.company}</p>
      `;
      card.onclick = () => showDetails(p);
      profilesContainer.appendChild(card);
    });
  };

  const showDetails = (p) => {
    modalContent.innerHTML = `
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <h2>${p.name}</h2>
      <p><strong>Batch:</strong> ${p.batch}</p>
      <p><strong>Company:</strong> ${p.company}</p>
      <p><strong>Role:</strong> ${p.role}</p>
      <p><strong>Salary:</strong> ${p.salary}</p>
      <p><strong>Email:</strong> <a href="mailto:${p.email}">${p.email}</a></p>
      <p><strong>Phone:</strong> <a href="tel:${p.phone}">${p.phone}</a></p>
      <p><strong>LinkedIn:</strong> <a href="${p.linkedin}" target="_blank">${p.linkedin}</a></p>
      <p><strong>Instagram:</strong> <a href="https://instagram.com/${p.insta}" target="_blank">@${p.insta}</a></p>
      ${p.facebook ? `<p><strong>Facebook:</strong> <a href="${p.facebook}" target="_blank">${p.facebook}</a></p>` : ""}
    `;
    modal.style.display = "flex";
  };

  const closeModal = () => {
    modal.style.display = "none";
  };

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const profile = {
      name: document.getElementById("name").value,
      batch: document.getElementById("batch").value,
      company: document.getElementById("company").value,
      role: document.getElementById("role").value,
      salary: document.getElementById("salary").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      linkedin: document.getElementById("linkedin").value,
      insta: document.getElementById("insta").value,
      facebook: document.getElementById("facebook").value,
      image: document.getElementById("image").value,
    };
    saveProfile(profile);
    form.reset();
  });

  // On load
  renderProfiles();
</script>

</body>
</html>
