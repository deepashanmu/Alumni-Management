<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Alumni Network</title>

  <!-- Font Awesome for social media icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      color:white;
      min-height: 100vh;
      background: url("https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1350&q=80")
                  center/cover no-repeat fixed;
      position: relative;
    }

    /* Overlay for readability */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:rgba(0,0,0,0.6);
      z-index: 0;
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 18px;
      background: #004d40;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }
    nav a {
      text-decoration: none;
      color:white;
      font-weight: bold;
      transition: 0.3s;
    }
    nav a:hover {
      color: #ff7043;
    }

    /* Page Container */
    .container {
      position: relative;
      z-index: 1;
      padding-top: 120px;
      padding-bottom: 60px;
    }

    /* Title */
    .contact-title {
      text-align: center;
      color: white;
      font-size: 2.5rem;
      margin-bottom: 40px;
    }

    /* Info Cards */
    .cards {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      width: 280px;
      text-align: center;
      transition: transform 0.3s;
    }
    .card:hover {
      transform: translateY(-8px);
    }
    .card h3 {
      color: #ff7043;
      margin-bottom: 10px;
    }

    /* Form */
    .form-box {
      max-width: 800px;
      margin: auto;
      background: #00695c white;
      backdrop-filter: blur(8px);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 8px 8px 20px white;
    }
    .form-box h3 {
      text-align: center;
      color: #ff7043;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      outline: none;
    }
    button {
      background: #ff7043;
      color: #000;
      border: none;
      padding: 12px 20px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background:#e64a19;
    }

    /* Footer */
    footer {
      background: #002621;
      text-align: center;
      padding: 15px;
      font-size: 0.85rem;
      position: relative;
      z-index: 1;
    }

    /* Social Links in Footer */
    .social-links {
      margin-top: 10px;
    }
    .social-links a {
      margin: 0 15px;
      color: #ff7043;
      font-size: 1.5rem;
      transition: color 0.3s, transform 0.3s;
    }
    .social-links a:hover {
      color: #ffffff;
      transform: scale(1.2);
    }

    @media(max-width: 768px) {
      .cards {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
    <a href="events.html">Events</a>
    <a href="profile.html">Profile</a> 
    <a href="emergency.html">Emergency</a>
  </nav>

  <!-- Content -->
  <div class="container">
    <h1 class="contact-title">Contact Our Alumni Network</h1>

    <!-- Info Cards -->
    <div class="cards">
      <div class="card">
        <h3>📍 Location</h3>
        <p>Vivekanandha College of Engineering for Women</p>
      </div>
      <div class="card">
        <h3>📧 Email</h3>
        <p>vcew@gamil.ac.in</p>
      </div>
      <div class="card">
        <h3>📞 Phone</h3>
        <p>+91 94437 34562</p>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="form-box">
      <h3>Send Us a Message</h3>
      <form>
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="message">Message</label>
        <textarea id="message" rows="6" placeholder="Write your message..." required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    &copy; 2025 VCEW | All Rights Reserved
    <div class="social-links">
      <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
      <a href="https://www.youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
  </footer>
</body>
</html>
